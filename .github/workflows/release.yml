name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  create-changeset:
    # Only run when PR is merged with a release label
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Check for release labels
        id: check-labels
        run: |
          LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
          echo "labels=$LABELS" >> $GITHUB_OUTPUT

          if echo "$LABELS" | grep -q "release:major"; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "release:minor"; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "release:patch"; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            echo "bump=none" >> $GITHUB_OUTPUT
          fi

      - name: Get changed packages
        id: changed-packages
        if: steps.check-labels.outputs.bump != 'none'
        run: |
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})

          # Detect which packages/modules changed
          PACKAGES=""

          # Check root package (src/, package.json, etc.)
          if echo "$CHANGED_FILES" | grep -qE "^(src/|package\.json|vite\.config|svelte\.config)"; then
            PACKAGES="$PACKAGES \"molos\""
          fi

          # Check packages directory
          for pkg in packages/*/; do
            pkg_name=$(basename "$pkg")
            if echo "$CHANGED_FILES" | grep -q "^$pkg"; then
              # Get package name from package.json
              pkg_json_name=$(cat "${pkg}package.json" 2>/dev/null | grep '"name"' | cut -d'"' -f4 || echo "")
              if [ -n "$pkg_json_name" ]; then
                PACKAGES="$PACKAGES \"$pkg_json_name\""
              fi
            fi
          done

          # Check modules directory
          for mod in modules/MoLOS-*/; do
            if echo "$CHANGED_FILES" | grep -q "^$mod"; then
              # Get package name from package.json
              mod_pkg_name=$(cat "${mod}package.json" 2>/dev/null | grep '"name"' | cut -d'"' -f4 || echo "")
              if [ -n "$mod_pkg_name" ]; then
                PACKAGES="$PACKAGES \"$mod_pkg_name\""
              fi
            fi
          done

          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "Detected changed packages:$PACKAGES"

      - name: Create changeset
        if: steps.check-labels.outputs.bump != 'none' && steps.changed-packages.outputs.packages != ''
        run: |
          BUMP="${{ steps.check-labels.outputs.bump }}"
          PACKAGES="${{ steps.changed-packages.outputs.packages }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Create unique changeset filename
          CHANGESET_FILE=".changeset/pr-${PR_NUMBER}-${BUMP}.md"

          # Create changeset content
          cat > "$CHANGESET_FILE" << EOF
          ---
          ${PACKAGES// /$'\n'/: $BUMP
          }---

          ${PR_TITLE} ([#${PR_NUMBER}](${{ github.server_url }}/${{ github.repository }}/pull/${PR_NUMBER}))
          EOF

          echo "Created changeset: $CHANGESET_FILE"
          cat "$CHANGESET_FILE"

      - name: Run changeset version
        if: steps.check-labels.outputs.bump != 'none' && steps.changed-packages.outputs.packages != ''
        run: bunx changeset version

      - name: Update modules.config.ts
        if: steps.check-labels.outputs.bump != 'none'
        run: bun run scripts/update-modules-config.ts || echo "modules.config.ts update skipped"

      - name: Create Version Packages PR
        if: steps.check-labels.outputs.bump != 'none'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: version packages'
          title: 'chore: version packages'
          body: |
            ## Version Packages

            This PR was auto-generated by the release workflow from PR #${{ github.event.pull_request.number }}.

            ### Changes
            - Version bumps as requested by `${{ steps.check-labels.outputs.bump }}` label
            - Updated CHANGELOGs
            - Updated modules.config.ts (if applicable)

            **Review and merge this PR to complete the release.**

            ---

            Merges #${{ github.event.pull_request.number }}
          branch: changeset-release/${{ github.event.pull_request.number }}
          labels: |
            release:skip
          draft: false

  notify-no-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        if: "!contains(join(github.event.pull_request.labels.*.name, ' '), 'release:')"
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'ℹ️ This PR was merged without a release label. No version bump will occur. Add `release:patch`, `release:minor`, or `release:major` to trigger a release.'
            })
